function makePipeline(name, opts) {
  opts = opts || {};
  return Object.assign({
    jobName: name,
    displayName: name,
    buildNumber: opts.buildNumber || (100 + Math.floor(Math.random() * 200)),
    buildUrl: '#',
    buildResult: opts.buildResult || 'SUCCESS',
    successRate7d: opts.successRate7d != null ? opts.successRate7d : 100,
    totalBuilds7d: opts.totalBuilds7d || 8,
    failureCount7d: opts.failureCount7d || 0,
    unstableCount7d: opts.unstableCount7d || 0,
    stages: opts.stages || DEFAULT_STAGES_OK,
    execTimes: opts.execTimes || fakeTimes(opts.avgSec || 240, 30, opts.trend || 0)
  }, opts.extra || {});
}

function fakeTimes(base, count, trend) {
  let s = 0xdeadbeef;
  const rnd = () => { s = (s * 1664525 + 1013904223) >>> 0; return (s & 0xffff) / 0x10000; };
  const out = [];
  for (let i = 0; i < count; i++) {
    const t = 1 + (trend || 0) * (i / Math.max(count - 1, 1));
    const j = 1 + (rnd() - 0.5) * 0.24;
    out.push(Math.max(5, Math.round(base * t * j)));
  }
  return out;
}
